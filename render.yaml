services:
  - type: web
    name: smart-finance-tracker-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: smartfinance
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
